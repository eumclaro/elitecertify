services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MANDRILL_API_KEY=${MANDRILL_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - PRODUCTION_URL=${PRODUCTION_URL}
      - PORT=3333
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/api/health"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 10
    volumes:
      - assets_data:/app/assets
    labels:
      - "traefik.enable=false"
    networks:
      - app
      - coolify
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.docker.network=coolify"
    networks:
      - app
      - coolify
    restart: unless-stopped

networks:
  app:
    driver: bridge
  coolify:
    external: true

volumes:
  assets_data:
