services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MANDRILL_API_KEY=${MANDRILL_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=3333
      - NODE_ENV=production
    networks:
      - app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app
    restart: unless-stopped

networks:
  app:
    driver: bridge
