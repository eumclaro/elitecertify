services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MANDRILL_API_KEY=${MANDRILL_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=3333
      - NODE_ENV=production
    volumes:
      - assets_data:/app/assets
    labels:
      - "traefik.enable=false"
    networks:
      - app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    labels:
      - "traefik.docker.network=coolify"
    networks:
      - app
      - coolify
    restart: unless-stopped

networks:
  app:
    driver: bridge
  coolify:
    external: true

volumes:
  assets_data:
