server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # Em vez de tentar o nome interno que está falhando, usamos o domínio público.
        # O Nginx vai fazer a requisição para a internet e o Coolify vai recebê-la 
        # normalmente como se fosse um usuário externo.
        proxy_pass https://api.certify.elitetraining.com.br/api/;
        
        proxy_http_version 1.1;
        proxy_set_header Host api.certify.elitetraining.com.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}