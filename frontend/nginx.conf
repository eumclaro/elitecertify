server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — forces nginx to re-resolve 'backend' every 30s
    # instead of caching the IP at startup (which breaks after every redeploy)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # IMPORTANT: when proxy_pass uses a variable, nginx does NOT strip the
    # location prefix when a URI is present in the directive. Use host-only
    # proxy_pass so nginx passes the full original request URI through.
    # e.g. /api/health -> http://backend:3333/api/health ✓

    location /api/ {
        set $upstream backend:3333;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        set $upstream backend:3333;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /assets/system/ {
        set $upstream backend:3333;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /assets/avatars/ {
        set $upstream backend:3333;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
