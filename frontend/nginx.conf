server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------
    # API & Backend Proxy
    # All /api/* requests go to the backend container on port 3333.
    # Using ^~ ensures this takes priority over regex locations.
    # proxy_pass WITHOUT trailing slash preserves the original URI:
    #   /api/health  →  http://backend:3333/api/health
    # ---------------------------------------------------------------
    location ^~ /api/ {
        proxy_pass http://backend:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Generous timeouts for heavy operations (PDF generation, reports)
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }

    # ---------------------------------------------------------------
    # Static assets served by backend (uploads, avatars, system images)
    # ---------------------------------------------------------------
    location /uploads/ {
        proxy_pass http://backend:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /assets/system/ {
        proxy_pass http://backend:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /assets/avatars/ {
        proxy_pass http://backend:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ---------------------------------------------------------------
    # Frontend SPA — catch-all for React Router
    # ---------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
